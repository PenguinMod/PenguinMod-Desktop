name: Build

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 6 * * *'

env:
  NODE_ENV: 'production'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --- Checkout ---
      - name: Checkout
        uses: actions/checkout@v4

      # --- Cache APT packages ---
      - name: Cache APT packages
        uses: actions/cache@v3
        with:
          path: apt-cache
          key: apt-cache-${{ runner.os }}-wine
          restore-keys: |
            apt-cache-${{ runner.os }}-

      # --- Install system dependencies ---
      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          
          # 1. Create a local directory for the cached .deb files
          mkdir -p apt-cache
          
          # 2. Download missing dependencies into the local folder instead of /var/cache/apt
          sudo apt-get install -y -d -o dir::cache::archives="$(pwd)/apt-cache" git curl jq zip unzip wine32 wine64
          
          # 3. Install the packages from your local cache folder
          sudo dpkg -i apt-cache/*.deb || sudo apt-get install -f -y
          
          # 4. Clean up any leftover root permissions so the runner can cache it safely
          sudo chown -R runner:runner apt-cache

      # --- Install Bun ---
      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      # --- Install Node.js ---
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26

      # --- Clone repos and cache per-repo node_modules ---

      # PenguinMod Extension Gallery
      - name: Clone PenguinMod Extension Gallery
        run: git clone --depth=1 https://github.com/PenguinMod/PenguinMod-ExtensionsGallery.git

      # TurboWarp Extension Gallery
      - name: Clone TurboWarp Extension Gallery
        run: git clone --depth=1 https://github.com/TurboWarp/extensions.git TurboWarp-ExtensionsGallery

      - name: Cache TurboWarp node_modules
        uses: actions/cache@v3
        with:
          path: TurboWarp-ExtensionsGallery/node_modules
          key: node-modules-turbowarp
          restore-keys: node-modules-turbowarp

      - name: Install TurboWarp deps
        run: |
          cd TurboWarp-ExtensionsGallery
          bun i
          bun run build

      # SharkPool Extension Gallery
      - name: Clone SharkPool Extension Gallery
        run: git clone --depth=1 https://github.com/SharkPool-SP/SharkPools-Extensions.git

      # PenguinMod Home
      - name: Clone PenguinMod Home
        run: git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Home.git

      - name: Cache PenguinMod Home node_modules
        uses: actions/cache@v3
        with:
          path: PenguinMod-Home/node_modules
          key: node-modules-penguinmod-home
          restore-keys: node-modules-penguinmod-home

      - name: Install PenguinMod Home deps
        run: |
          cd PenguinMod-Home
          mv .env.template .env
          bun i

      # PenguinMod GUI
      - name: Clone PenguinMod GUI
        run: git clone --depth=1 https://github.com/PenguinMod/penguinmod.github.io.git

      - name: Cache GUI node_modules
        uses: actions/cache@v3
        with:
          path: penguinmod.github.io/node_modules
          key: node-modules-penguinmod-gui
          restore-keys: node-modules-penguinmod-gui

      - name: Install GUI deps
        run: |
          cd penguinmod.github.io
          bun i

      # PenguinMod VM
      - name: Clone PenguinMod VM
        run: |
          cd penguinmod.github.io
          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Vm.git

      - name: Cache VM node_modules
        uses: actions/cache@v3
        with:
          path: penguinmod.github.io/PenguinMod-Vm/node_modules
          key: node-modules-penguinmod-vm
          restore-keys: node-modules-penguinmod-vm

      - name: Install VM deps
        run: |
          cd penguinmod.github.io/PenguinMod-Vm
          bun i
          cd ..
          rm -rf node_modules/scratch-vm
          mv PenguinMod-Vm node_modules/scratch-vm

      # PenguinMod Blocks
      - name: Clone PenguinMod Blocks
        run: |
          cd penguinmod.github.io
          git clone --depth=1 -b develop-builds https://github.com/PenguinMod/PenguinMod-Blocks.git

      - name: Cache Blocks node_modules
        uses: actions/cache@v3
        with:
          path: penguinmod.github.io/PenguinMod-Blocks/node_modules
          key: node-modules-penguinmod-blocks
          restore-keys: node-modules-penguinmod-blocks

      - name: Install Blocks deps
        run: |
          cd penguinmod.github.io/PenguinMod-Blocks
          bun i
          cd ..
          rm -rf node_modules/scratch-blocks
          mv PenguinMod-Blocks node_modules/scratch-blocks

      # PenguinMod Render
      - name: Clone PenguinMod Render
        run: |
          cd penguinmod.github.io
          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Render.git

      - name: Cache Render node_modules
        uses: actions/cache@v3
        with:
          path: penguinmod.github.io/PenguinMod-Render/node_modules
          key: node-modules-penguinmod-render
          restore-keys: node-modules-penguinmod-render

      - name: Install Render deps
        run: |
          cd penguinmod.github.io/PenguinMod-Render
          rm -f package-lock.json
          bun i
          cd ..
          rm -rf node_modules/scratch-render
          mv PenguinMod-Render node_modules/scratch-render

      # PenguinMod Paint
      - name: Clone PenguinMod Paint
        run: |
          cd penguinmod.github.io
          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Paint.git

      - name: Cache Paint node_modules
        uses: actions/cache@v3
        with:
          path: penguinmod.github.io/PenguinMod-Paint/node_modules
          key: node-modules-penguinmod-paint
          restore-keys: node-modules-penguinmod-paint

      - name: Install Paint deps
        run: |
          cd penguinmod.github.io/PenguinMod-Paint
          bun i
          cd ..
          rm -rf node_modules/scratch-paint
          mv PenguinMod-Paint node_modules/scratch-paint

      # --- Build Web App ---
      - name: Build PenguinMod Web
        run: |
          cd penguinmod.github.io
          bun run build
          cp -R build ../app
          cd ..
          rm -rf app/package.json app/node_modules
          cd PenguinMod-Home
          bun run build
          cp -R public ../app
          cd ..
          cp -R PenguinMod-ExtensionsGallery SharkPools-Extensions app/
          cp -R TurboWarp-ExtensionsGallery/build app/TurboWarp-ExtensionsGallery

      # --- Install prod-only deps ---
      - name: Install production deps
        run: |
          rm -rf node_modules
          mkdir node_modules
          bun i --omit=dev

      # --- Build Electron App ---
      - name: Build Electron App
        run: npx electron-builder --linux AppImage deb rpm --win nsis --publish never

      # --- Zip artifacts ---
      - name: Zip linux-unpacked
        run: zip -r builds/linux-unpacked.zip builds/linux-unpacked

      - name: Zip win-unpacked
        run: zip -r builds/win-unpacked.zip builds/win-unpacked

      # --- Upload Linux .deb ---
      - name: Upload Linux .deb
        run: echo "ARTIFACT_NAME=$(basename builds/*.deb)" >> $GITHUB_ENV
      - name: Upload Linux .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/*.deb
          archive: false

      # --- Upload Linux .rpm ---
      - name: Upload Linux .rpm
        run: echo "ARTIFACT_NAME=$(basename builds/*.rpm)" >> $GITHUB_ENV
      - name: Upload Linux .rpm artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/*.rpm
          archive: false

      # --- Upload Linux AppImage ---
      - name: Upload Linux AppImage
        run: echo "ARTIFACT_NAME=$(basename builds/*.AppImage)" >> $GITHUB_ENV
      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/*.AppImage
          archive: false

      # --- Upload linux-unpacked zip ---
      - name: Upload linux-unpacked
        run: echo "ARTIFACT_NAME=$(basename builds/linux-unpacked.zip)" >> $GITHUB_ENV
      - name: Upload linux-unpacked artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/linux-unpacked.zip
          archive: false

      # --- Upload win-unpacked zip ---
      - name: Upload win-unpacked
        run: echo "ARTIFACT_NAME=$(basename builds/win-unpacked.zip)" >> $GITHUB_ENV
      - name: Upload win-unpacked artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/win-unpacked.zip
          archive: false

      # --- Upload Windows installer .exe ---
      - name: Upload Windows installer
        run: echo "ARTIFACT_NAME=$(basename builds/*.exe)" >> $GITHUB_ENV
      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/*.exe
          archive: false
