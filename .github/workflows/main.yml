name: Build

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 6 * * *'

env:
  NODE_ENV: 'production'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --- Checkout ---
      - name: Checkout
        uses: actions/checkout@v4

      # --- Generate Dynamic Cache Key Components ---
      - name: Get current week
        run: echo "WEEK_STAMP=$(date +'%Y-%U')" >> $GITHUB_ENV

      # --- Cache APT packages ---
      - name: Cache APT packages
        uses: actions/cache@v3
        with:
          path: apt-cache
          key: apt-cache-${{ runner.os }}-wine-${{ env.WEEK_STAMP }}
          restore-keys: |
            apt-cache-${{ runner.os }}-wine-
            apt-cache-${{ runner.os }}-

      # --- Install system dependencies ---
      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          
          mkdir -p apt-cache
          
          # Download missing dependencies into local folder instead of /var/cache/apt
          sudo apt-get install -y -d -o dir::cache::archives="$(pwd)/apt-cache" git curl jq zip unzip wine32 wine64
          
          # Install the packages from local cache folder
          sudo dpkg -i apt-cache/*.deb || sudo apt-get install -f -y
          
          # Clean up root permissions so standard runner can cache it safely
          sudo chown -R runner:runner apt-cache

      # --- Install Bun ---
      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      # --- Install Node.js ---
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26

      # --- Clone Standalone Repos and Cache ---

      # PenguinMod Extension Gallery
      - name: Clone PenguinMod Extension Gallery
        run: git clone --depth=1 https://github.com/PenguinMod/PenguinMod-ExtensionsGallery.git

      # TurboWarp Extension Gallery
      - name: Clone TurboWarp Extension Gallery
        run: git clone --depth=1 https://github.com/TurboWarp/extensions.git TurboWarp-ExtensionsGallery

      - name: Cache TurboWarp node_modules
        uses: actions/cache@v3
        with:
          path: TurboWarp-ExtensionsGallery/node_modules
          key: node-modules-turbowarp-${{ env.WEEK_STAMP }}
          restore-keys: |
            node-modules-turbowarp-

      - name: Install TurboWarp deps
        run: |
          cd TurboWarp-ExtensionsGallery
          bun i
          bun run build

      # SharkPool Extension Gallery
      - name: Clone SharkPool Extension Gallery
        run: git clone --depth=1 https://github.com/SharkPool-SP/SharkPools-Extensions.git

      # PenguinMod Home
      - name: Clone PenguinMod Home
        run: git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Home.git

      - name: Cache PenguinMod Home node_modules
        uses: actions/cache@v3
        with:
          path: PenguinMod-Home/node_modules
          key: node-modules-penguinmod-home-${{ env.WEEK_STAMP }}
          restore-keys: |
            node-modules-penguinmod-home-

      - name: Install PenguinMod Home deps
        run: |
          cd PenguinMod-Home
          mv .env.template .env
          bun i

      # --- Clone PenguinMod GUI Main Repository ---
      - name: Clone PenguinMod GUI
        run: git clone --depth=1 https://github.com/PenguinMod/penguinmod.github.io.git

      # --- CONSOLIDATED GUI & SUBMODULES CACHE ---
      - name: Cache GUI and Submodule node_modules
        id: gui-cache
        uses: actions/cache@v3
        with:
          path: |
            penguinmod.github.io/node_modules
            penguinmod.github.io/PenguinMod-Vm/node_modules
            penguinmod.github.io/PenguinMod-Blocks/node_modules
            penguinmod.github.io/PenguinMod-Render/node_modules
            penguinmod.github.io/PenguinMod-Paint/node_modules
          key: node-modules-penguinmod-combined-${{ hashFiles('penguinmod.github.io/package.json') }}-${{ env.WEEK_STAMP }}
          restore-keys: |
            node-modules-penguinmod-combined-${{ hashFiles('penguinmod.github.io/package.json') }}-
            node-modules-penguinmod-combined-

      # --- Process Submodules and Run Updates ---
      - name: Setup GUI Dependencies & Submodules
        run: |
          cd penguinmod.github.io
          
          # 1. Clone the absolute latest code for all submodules
          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Vm.git
          git clone --depth=1 -b develop-builds https://github.com/PenguinMod/PenguinMod-Blocks.git
          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Render.git
          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Paint.git
          
          # 2. Rehydrate subfolder node_modules from the cache if they exist
          if [ -d "node_modules/scratch-vm/node_modules" ]; then
            mv node_modules/scratch-vm/node_modules PenguinMod-Vm/
          fi
          if [ -d "node_modules/scratch-blocks/node_modules" ]; then
            mv node_modules/scratch-blocks/node_modules PenguinMod-Blocks/
          fi
          if [ -d "node_modules/scratch-render/node_modules" ]; then
            mv node_modules/scratch-render/node_modules PenguinMod-Render/
          fi
          if [ -d "node_modules/scratch-paint/node_modules" ]; then
            mv node_modules/scratch-paint/node_modules PenguinMod-Paint/
          fi
          
          # 3. Trigger installations. Bun skips existing files instantly, fetching only upstream updates.
          bun i
          cd PenguinMod-Vm && bun i && cd ..
          cd PenguinMod-Blocks && bun i && cd ..
          cd PenguinMod-Render && rm -f package-lock.json && bun i && cd ..
          cd PenguinMod-Paint && bun i && cd ..
          
          # 4. Final nesting structure adjustment for compilation
          rm -rf node_modules/scratch-vm && mv PenguinMod-Vm node_modules/scratch-vm
          rm -rf node_modules/scratch-blocks && mv PenguinMod-Blocks node_modules/scratch-blocks
          rm -rf node_modules/scratch-render && mv PenguinMod-Render node_modules/scratch-render
          rm -rf node_modules/scratch-paint && mv PenguinMod-Paint node_modules/scratch-paint

      # --- Build Web App ---
      - name: Build PenguinMod Web
        run: |
          cd penguinmod.github.io
          bun run build
          cp -R build ../app
          cd ..
          rm -rf app/package.json app/node_modules
          cd PenguinMod-Home
          bun run build
          cp -R public ../app
          cd ..
          cp -R PenguinMod-ExtensionsGallery SharkPools-Extensions app/
          cp -R TurboWarp-ExtensionsGallery/build app/TurboWarp-ExtensionsGallery

      # --- Install prod-only deps ---
      - name: Install production deps
        run: |
          rm -rf node_modules
          mkdir node_modules
          bun i --omit=dev

      # --- Build Electron App ---
      - name: Build Electron App
        run: npx electron-builder --linux AppImage deb rpm --win nsis --publish never

      # --- Zip artifacts ---
      - name: Zip linux-unpacked
        run: zip -r builds/linux-unpacked.zip builds/linux-unpacked

      # --- Zip win-unpacked ---
      - name: Zip win-unpacked
        run: zip -r builds/win-unpacked.zip builds/win-unpacked

      # --- Upload Linux .deb ---
      - name: Upload Linux .deb
        run: echo "ARTIFACT_NAME=$(basename builds/*.deb)" >> $GITHUB_ENV
      - name: Upload Linux .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/*.deb
          archive: false

      # --- Upload Linux .rpm ---
      - name: Upload Linux .rpm
        run: echo "ARTIFACT_NAME=$(basename builds/*.rpm)" >> $GITHUB_ENV
      - name: Upload Linux .rpm artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/*.rpm
          archive: false

      # --- Upload Linux AppImage ---
      - name: Upload Linux AppImage
        run: echo "ARTIFACT_NAME=$(basename builds/*.AppImage)" >> $GITHUB_ENV
      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/*.AppImage
          archive: false

      # --- Upload linux-unpacked zip ---
      - name: Upload linux-unpacked
        run: echo "ARTIFACT_NAME=$(basename builds/linux-unpacked.zip)" >> $GITHUB_ENV
      - name: Upload linux-unpacked artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/linux-unpacked.zip
          archive: false

      # --- Upload win-unpacked zip ---
      - name: Upload win-unpacked
        run: echo "ARTIFACT_NAME=$(basename builds/win-unpacked.zip)" >> $GITHUB_ENV
      - name: Upload win-unpacked artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/win-unpacked.zip
          archive: false

      # --- Upload Windows installer .exe ---
      - name: Upload Windows installer
        run: echo "ARTIFACT_NAME=$(basename builds/*.exe)" >> $GITHUB_ENV
      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/*.exe
          archive: false
