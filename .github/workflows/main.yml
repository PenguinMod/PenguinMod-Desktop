name: Build

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 6 * * *'

env:
  NODE_ENV: 'production'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Cache APT packages ---
      - name: Cache APT packages
        uses: actions/cache@v3
        with:
          path: /var/cache/apt
          key: apt-cache-${{ runner.os }}-wine
          restore-keys: |
            apt-cache-${{ runner.os }}-
      
      # --- Install system dependencies ---
      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y git curl jq zip unzip wine32 wine64

      # --- Install Bun ---
      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      # --- Install Node.js ---
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26

      # --- Cache Bun & node_modules ---
      - name: Cache Bun & node_modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.bun
            penguinmod.github.io/node_modules
          key: bun-deps-${{ hashFiles('**/bun.lockb') }}

      # --- Clone repositories & install Bun deps ---
      - name: Clone PenguinMod Extension Gallery
        run: git clone --depth=1 https://github.com/PenguinMod/PenguinMod-ExtensionsGallery.git

      - name: Clone TurboWarp Extension Gallery
        run: |
          git clone --depth=1 https://github.com/TurboWarp/extensions.git TurboWarp-ExtensionsGallery
          cd TurboWarp-ExtensionsGallery
          bun i --force
          bun run build

      - name: Clone SharkPool Extension Gallery
        run: git clone --depth=1 https://github.com/SharkPool-SP/SharkPools-Extensions.git

      - name: Clone PenguinMod home
        run: |
          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Home.git
          cd PenguinMod-Home
          mv .env.template .env
          bun i --force

      - name: Clone PenguinMod GUI & submodules
        run: |
          git clone --depth=1 https://github.com/PenguinMod/penguinmod.github.io.git
          cd penguinmod.github.io
          bun i --force

          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Vm.git
          cd PenguinMod-Vm
          bun i --force
          cd ..
          rm -rf node_modules/scratch-vm
          mv PenguinMod-Vm node_modules/scratch-vm

          git clone --depth=1 -b develop-builds https://github.com/PenguinMod/PenguinMod-Blocks.git
          cd PenguinMod-Blocks
          bun i --force
          cd ..
          rm -rf node_modules/scratch-blocks
          mv PenguinMod-Blocks node_modules/scratch-blocks

          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Render.git
          cd PenguinMod-Render
          rm -f package-lock.json
          bun i --force
          cd ..
          rm -rf node_modules/scratch-render
          mv PenguinMod-Render node_modules/scratch-render

          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Paint.git
          cd PenguinMod-Paint
          bun i --force
          cd ..
          rm -rf node_modules/scratch-paint
          mv PenguinMod-Paint node_modules/scratch-paint

      # --- Final Bun install for project ---
      - name: Install deps
        run: bun i --force

      # --- Build web app ---
      - name: Build PenguinMod
        run: |
          cd penguinmod.github.io
          bun run build
          cp -R build ../app
          cd ..
          rm -rf app/package.json app/node_modules
          cd PenguinMod-Home
          bun run build
          cp -R public ../app
          cd ..
          cp -R PenguinMod-ExtensionsGallery SharkPools-Extensions app/
          cp -R TurboWarp-ExtensionsGallery/build app/TurboWarp-ExtensionsGallery

      # --- Install only production deps ---
      - name: Install production deps
        run: |
          rm -rf node_modules
          mkdir node_modules
          bun i --force --omit=dev

      # --- Build Electron App ---
      - name: Build Electron App
        run: npx electron-builder --linux AppImage deb rpm --win nsis --publish never

      # --- Zip and Upload artifacts ---
      - name: Zip linux-unpacked
        run: zip -r builds/linux-unpacked.zip builds/linux-unpacked

      - name: Zip win-unpacked
        run: zip -r builds/win-unpacked.zip builds/win-unpacked

      # --- Upload artifacts ---
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: all-artifacts
          path: builds/
          archive: false
