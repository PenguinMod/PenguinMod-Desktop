name: Build

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl jq zip unzip
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine32 wine64

      # Clone PenguinMod GUI and submodules
      - name: Clone PenguinMod GUI
        run: |
          git clone --depth=1 https://github.com/PenguinMod/penguinmod.github.io.git
          cd penguinmod.github.io
          bun i --force

      - name: Clone PenguinMod VM
        run: |
          cd penguinmod.github.io
          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Vm.git
          cd PenguinMod-Vm
          bun i --force
          cd ..
          rm -rf node_modules/scratch-vm
          mv PenguinMod-Vm node_modules/scratch-vm

      - name: Clone PenguinMod Blocks
        run: |
          cd penguinmod.github.io
          git clone --depth=1 -b develop-builds https://github.com/PenguinMod/PenguinMod-Blocks.git
          cd PenguinMod-Blocks
          bun i --force
          cd ..
          rm -rf node_modules/scratch-blocks
          mv PenguinMod-Blocks node_modules/scratch-blocks

      - name: Clone PenguinMod Renderer
        run: |
          cd penguinmod.github.io
          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Render.git
          cd PenguinMod-Render
          bun i --force
          cd ..
          rm -rf node_modules/scratch-render
          mv PenguinMod-Render node_modules/scratch-render

      - name: Clone PenguinMod Paint
        run: |
          cd penguinmod.github.io
          git clone --depth=1 https://github.com/PenguinMod/PenguinMod-Paint.git
          cd PenguinMod-Paint
          bun i --force
          cd ..
          rm -rf node_modules/scratch-paint
          mv PenguinMod-Paint node_modules/scratch-paint

      # Build web app
      - name: Build PenguinMod
        run: |
          cd penguinmod.github.io
          bun run build
          cp -R build ../app
          cd ..
          rm -f app/package.json
          mkdir -p app/node_modules
          cp -R node_modules/deasync app/node_modules/

      # Install Electron deps
      - name: Install Electron deps
        run: npm install

      # Build desktop app
      - name: Build Electron App
        run: npx electron-builder --linux AppImage deb rpm --win nsis --publish never

      # --- Zip unpacked folders first ---
      - name: Zip linux-unpacked
        run: zip -r builds/linux-unpacked.zip builds/linux-unpacked
      
      - name: Zip win-unpacked
        run: zip -r builds/win-unpacked.zip builds/win-unpacked
      
      # --- Upload Linux .deb ---
      - name: Upload Linux .deb
        run: echo "ARTIFACT_NAME=$(basename builds/*.deb)" >> $GITHUB_ENV
      - name: Upload Linux .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/*.deb
          archive: false
      
      # --- Upload Linux .rpm ---
      - name: Upload Linux .rpm
        run: echo "ARTIFACT_NAME=$(basename builds/*.rpm)" >> $GITHUB_ENV
      - name: Upload Linux .rpm artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/*.rpm
          archive: false
      
      # --- Upload Linux AppImage ---
      - name: Upload Linux AppImage
        run: echo "ARTIFACT_NAME=$(basename builds/*.AppImage)" >> $GITHUB_ENV
      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/*.AppImage
          archive: false
      
      # --- Upload linux-unpacked zip ---
      - name: Upload linux-unpacked
        run: echo "ARTIFACT_NAME=$(basename builds/linux-unpacked.zip)" >> $GITHUB_ENV
      - name: Upload linux-unpacked artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/linux-unpacked.zip
          archive: false
      
      # --- Upload win-unpacked zip ---
      - name: Upload win-unpacked
        run: echo "ARTIFACT_NAME=$(basename builds/win-unpacked.zip)" >> $GITHUB_ENV
      - name: Upload win-unpacked artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/win-unpacked.zip
          archive: false
      
      # --- Upload Windows installer .exe ---
      - name: Upload Windows installer
        run: echo "ARTIFACT_NAME=$(basename builds/*.exe)" >> $GITHUB_ENV
      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: builds/*.exe
          archive: false
